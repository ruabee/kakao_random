<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>선착순 선물 이벤트</title>
  <meta name="description" content="EXIT를 위한 깜짝 선물이 도착했어요. 지금 바로 확인해보세요!" />

  <!-- 카카오톡 미리보기 -->
  <meta property="og:type" content="website" />
  <!--meta property="og:title" content="선착순 선물 쏜다! 지금 확인하기" /-->
  <!--meta property="og:description" content="EXIT를 위한 깜짝 선물이 도착했어요. 지금 바로 확인해보세요!" /-->
  <meta property="og:image" content="https://kakao-random.vercel.app/kakaoall.png" />
  <meta property="og:url" content="https://kakao-random.vercel.app/" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #ffeb00;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      width: 100%;
      max-width: 560px;
      height: 100vh;
      position: relative;
      background: #ffeb00;
      overflow: hidden;
    }

    .page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      transition: opacity 0.5s ease;
      padding: 0;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    .visible {
      opacity: 1;
      pointer-events: auto;
    }

    .suspense-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .reveal-wrap {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #fff7c2 0%, #ffe500 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
      text-align: center;
    }

    .badge {
      font-size: 18px;
      font-weight: 800;
      color: #222;
      background: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      margin-bottom: 18px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .title {
      font-size: 42px;
      line-height: 1.2;
      font-weight: 900;
      color: #111;
      margin: 0 0 14px;
      letter-spacing: -1.6px;
    }

    .desc {
      font-size: 20px;
      line-height: 1.7;
      color: #333;
      margin: 0 0 28px;
      word-break: keep-all;
    }

    .emoji {
      font-size: 84px;
      line-height: 1;
      margin-bottom: 26px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #111;
      color: #fff;
      font-size: 19px;
      font-weight: 800;
      padding: 16px 24px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .sub {
      margin-top: 16px;
      font-size: 14px;
      color: #666;
    }

    .count {
      position: absolute;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }


    @media (max-width: 480px) {
      .title {
        font-size: 34px;
      }

      .desc {
        font-size: 18px;
      }

      .emoji {
        font-size: 72px;
      }

      .btn {
        font-size: 17px;
        padding: 15px 22px;
      }
    }
  </style>
<body>
  <div class="screen">
    <!-- 첫 화면 -->
    <section id="suspensePage" class="page visible">
      <img
        class="suspense-img"
        src="./suspense.png"
        alt="두근두근, 과연 선물의 주인공이 될 수 있을까요?"
      />
      <div class="count" id="countText">3초 뒤 결과 공개...</div>
    </section>

    <!-- 두 번째 화면 -->
    <section id="revealPage" class="page hidden">
      <div class="reveal-wrap">
        <div class="badge">짜잔</div>
        <div class="emoji">🎉😜</div>
        <h1 class="title">만우절 장난!</h1>
        <p class="desc">
          선물인 줄 알았죠?<br />
          해피 만우절입니다 💛
        </p>
        <a class="btn" href="javascript:location.reload()">다시 보기</a>
        <div class="sub">메롱 😎</div>
      </div>
    </section>
  </div>

  <script>
    const suspensePage = document.getElementById("suspensePage");
    const revealPage = document.getElementById("revealPage");
    const countText = document.getElementById("countText");

    let seconds = 3;

    const timer = setInterval(() => {
      seconds--;

      if (seconds > 0) {
        countText.textContent = `${seconds}초 뒤 결과 공개...`;
      } else {
        clearInterval(timer);
        suspensePage.classList.remove("visible");
        suspensePage.classList.add("hidden");

        revealPage.classList.remove("hidden");
        revealPage.classList.add("visible");
      }
    }, 1000);
  </script>
</body>
</html>
