<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>선착순 선물 이벤트</title>
  <meta name="description" content="EXIT를 위한 깜짝 선물이 도착했어요. 지금 바로 확인해보세요!" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="선착순 선물 쏜다! 지금 확인하기" />
  <meta property="og:description" content="EXIT를 위한 깜짝 선물이 도착했어요. 지금 바로 확인해보세요!" />
  <meta property="og:image" content="https://kakao-random.vercel.app/kakaor.png" />
  <meta property="og:url" content="https://kakao-random.vercel.app/" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #ffeb00;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      width: 100%;
      max-width: 560px;
      height: 100vh;
      position: relative;
      background: #ffeb00;
      overflow: hidden;
    }

    .page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      transition: opacity 0.5s ease;
      padding: 0;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    .visible {
      opacity: 1;
      pointer-events: auto;
    }

    .suspense-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .count {
      position: absolute;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    /* 두 번째 화면 */
    .reveal-page {
      background: #ffe500;
      justify-content: space-between;
    }

    .reveal-top {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 10px;
    }

    .reveal-top img {
      width: 100%;
      max-width: 420px;
      object-fit: contain;
      display: block;
    }

    .bottom-card {
      width: 100%;
      background: #ffffff;
      border-radius: 26px 26px 0 0;
      padding: 22px 18px 20px;
      box-shadow: 0 -6px 20px rgba(0, 0, 0, 0.06);
    }

    .bottom-text {
      margin: 0 0 18px;
      font-size: 18px;
      line-height: 1.5;
      font-weight: 700;
      color: #333;
      word-break: keep-all;
    }

    .detail-btn {
      width: 100%;
      border: none;
      background: #f2f2f2;
      color: #222;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 16px;
      border-radius: 14px;
      text-align: center;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .detail-btn:active {
      transform: scale(0.99);
    }

    .brand-row {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #9c9c9c;
      font-size: 15px;
      font-weight: 600;
    }

    .gift-icon {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      background: #fff5c9;
      border: 1px solid #e8d77b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .bottom-text {
        font-size: 16px;
      }

      .detail-btn {
        font-size: 17px;
        padding: 16px 14px;
      }

      .brand-row {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <!-- 첫 화면 -->
    <section id="suspensePage" class="page visible">
      <img
        class="suspense-img"
        src="./suspense.png"
        alt="두근두근, 과연 선물의 주인공이 될 수 있을까요?"
      />
      <div class="count" id="countText">3초 뒤 결과 공개...</div>
    </section>

    <!-- 두 번째 화면 -->
    <section id="revealPage" class="page hidden reveal-page">
      <div class="reveal-top">
        <img src="./suspense.png" alt="랜덤 선물 안내 이미지" />
      </div>

      <div class="bottom-card">
        <p class="bottom-text">
          EXIT님이 랜덤 6명에게 선물을 보내셨습니다.
          행운의 주인공은?
        </p>

        <button class="detail-btn" onclick="location.reload()">
          자세히보기
        </button>

        <div class="brand-row">
          <span class="gift-icon">🎁</span>
          <span>카카오톡 선물하기</span>
        </div>
      </div>
    </section>
  </div>

  <script>
    const suspensePage = document.getElementById("suspensePage");
    const revealPage = document.getElementById("revealPage");
    const countText = document.getElementById("countText");

    let seconds = 3;

    const timer = setInterval(() => {
      seconds--;

      if (seconds > 0) {
        countText.textContent = `${seconds}초 뒤 결과 공개...`;
      } else {
        clearInterval(timer);
        suspensePage.classList.remove("visible");
        suspensePage.classList.add("hidden");

        revealPage.classList.remove("hidden");
        revealPage.classList.add("visible");
      }
    }, 1000);
  </script>
</body>
</html>
