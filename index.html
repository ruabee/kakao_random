<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선착순 선물 쏜다! 지금 시작!</title>

  <!-- 카카오톡 미리보기용 -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="선착순 선물 쏜다! 지금 시작!" />
  <meta property="og:description" content="선착순 선물 게임이 시작됩니다! 기회는 단 10분간, 선착순 20명에게!" />
  <meta property="og:image" content="https://your-domain.com/preview.jpg" />
  <meta property="og:url" content="https://your-domain.com/" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #e9edf3;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
    }

    .phone-wrap {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: #fff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .hero {
      background: #ffe500;
      text-align: center;
      padding: 26px 18px 20px;
      position: relative;
    }

    .hero h1 {
      margin: 0;
      font-size: 38px;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: -1.5px;
      color: #111;
    }

    .hero .go-text {
      margin-top: 14px;
      font-size: 54px;
      font-weight: 900;
      color: #d72222;
      letter-spacing: -2px;
      text-shadow: 2px 2px 0 #111;
    }

    .hero .emoji {
      font-size: 86px;
      line-height: 1;
      margin: 6px 0 4px;
    }

    .content {
      padding: 28px 22px 20px;
      background: #f5f5f5;
    }

    .desc {
      margin: 0 0 24px;
      font-size: 20px;
      line-height: 1.7;
      color: #222;
      word-break: keep-all;
    }

    .action-btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: #ececec;
      color: #222;
      font-size: 22px;
      font-weight: 700;
      padding: 24px 16px;
      border-radius: 16px;
      transition: 0.2s ease;
    }

    .action-btn:hover {
      background: #e2e2e2;
    }

    .kakao-hint {
      margin-top: 18px;
      color: #8a8a8a;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gift-icon {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: #fff7cc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e5d98a;
      font-size: 15px;
    }

    @media (max-width: 480px) {
      .hero h1 {
        font-size: 32px;
      }

      .hero .go-text {
        font-size: 46px;
      }

      .hero .emoji {
        font-size: 74px;
      }

      .desc {
        font-size: 18px;
      }

      .action-btn {
        font-size: 20px;
        padding: 22px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="phone-wrap">
    <div class="card">
      <div class="hero">
        <h1>선착순 선물 쏜다!<br>지금 시작!</h1>
        <div class="go-text">GO! 🐰 GO!</div>
      </div>

      <div class="content">
        <p class="desc">
          선착순 선물 게임이 시작됩니다! 기회는 단 10분간,
          선착순 20명에게!
        </p>

        <a class="action-btn" href="https://your-real-link.com">
          지금 달려가기
        </a>

        <div class="kakao-hint">
          <span class="gift-icon">🎁</span>
          <span>카카오톡 선물하기</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
